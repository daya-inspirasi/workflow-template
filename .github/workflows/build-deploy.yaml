name: Build & Deploy

on:
  workflow_call:
    inputs:
      image_name:
        type: string
        required: true
      version:
        type: string
        required: true
      runner:
        type: string
        default: '["ubuntu-24.04"]'
      enable_tailscale:
        type: boolean
        default: false
      release_env:
        type: string
        default: dev
    secrets:
      REGISTRY_SERVER:
        required: true
      REGISTRY_USERNAME:
        required: true
      REGISTRY_PASSWORD:
        required: true
      TAILSCALE_SERVER:
        required: true
      TAILSCALE_PREAUTH_KEY:
        required: true
      SSH_PRIVATE_KEY:
        required: true
      DEPLOYMENT_REPO:
        required: true

jobs:
  build-and-deploy:
    runs-on: ${{ fromJSON(inputs.runner) }}

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout application source code
        uses: actions/checkout@v4

      - name: Install Tailscale
        if: inputs.enable_tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Connect to Headscale
        if: inputs.enable_tailscale
        run: |
          sudo tailscale up \
            --login-server=${{ secrets.TAILSCALE_SERVER }} \
            --authkey=${{ secrets.TAILSCALE_PREAUTH_KEY }} \
            --hostname=gha-${{ github.run_id }} \
            --advertise-tags=tag:ci \
            --accept-routes

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ inputs.image_name }}:${{ inputs.version }}
            ${{ inputs.image_name }}:latest

      - name: Checkout kustomize repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.DEPLOYMENT_REPO }}
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Update kustomize image
        run: |
          cd $GITHUB_REPOSITORY/${{ inputs.release_env }}
          kustomize edit set image app=${{ inputs.image_name }}:${{ inputs.release_env }}

      - name: Commit and push
        run: |
          cd $GITHUB_REPOSITORY
          git config user.name "Bot"
          git config user.email "bot@dayainspirasi.id"
          git add .
          git commit -am "chore: deploy ${{ inputs.release_env }}" || echo "No changes to commit"
          git push
