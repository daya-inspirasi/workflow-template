name: Docker Build & Push Image

on:
  workflow_call:
    inputs:
      image_name:
        type: string
        required: true
      version:
        type: string
        required: true
      runner:
        type: string
        default: ubuntu-24.04
      enable_tailscale:
        type: boolean
        default: false
    secrets:
      REGISTRY_USERNAME:
        required: true
      REGISTRY_PASSWORD:
        required: true
      TAILSCALE_SERVER:
        required: true
      TAILSCALE_PREAUTH_KEY:
        required: true

jobs:
  build:
    runs-on: ${{ inputs.runner }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Install Tailscale
        if: inputs.enable_tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Connect to Headscale
        if: inputs.enable_tailscale
        run: |
          sudo tailscale up \
            --login-server=${{ secrets.TAILSCALE_SERVER }} \
            --authkey=${{ secrets.TAILSCALE_PREAUTH_KEY }} \
            --hostname=gha-${{ github.run_id }} \
            --advertise-tags=tag:ci \
            --accept-routes

      - name: Checkout application repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login To Private Registry
        uses: docker/login-action@v3
        with:
          registry: registry.sevencode.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ inputs.image_name }}:${{ inputs.version }}
            ${{ inputs.image_name }}:latest
